<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="KAIRO">
  <rect width="100" height="100" fill="#000000"/>
  <g stroke="#FFFFFF" stroke-width="7" stroke-linecap="square" fill="none">
    <!-- Top short vertical (K stem top) -->
    <line x1="55" y1="22" x2="55" y2="50"/>
    <!-- Left short horizontal (K stem left) -->
    <line x1="22" y1="55" x2="50" y2="55"/>
    <!-- Long NW->SE diagonal -->
    <line x1="30" y1="30" x2="82" y2="82"/>
    <!-- Long NE->SW diagonal -->
    <line x1="78" y1="22" x2="22" y2="78"/>
  </g>
</svg>
